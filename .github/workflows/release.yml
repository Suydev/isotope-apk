name: 🚀 Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '22'
  ISOTOPE_CODE_REF: 'fd39fad1384333ad774f19f35b754659a34dae60'

jobs:
  release:
    name: Build APK/AAB and Create or Update GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: release-${{ github.ref_name }}
      cancel-in-progress: false

    steps:
      # ── Checkout this repo (Capacitor wrapper + bridge) ───────────────────
      - name: ⬇️ Checkout isotope-apk
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: 🏷️ Get tag info
        id: tag
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
          else
            VERSION="$(node -p "require('./package.json').version" 2>/dev/null || echo "")"
            if [ -z "$VERSION" ]; then
              echo "❌ Could not read version from package.json"
              exit 1
            fi
            TAG="v${VERSION}"
          fi
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9.-]+)?$'; then
            echo "❌ Invalid package version: $VERSION"
            exit 1
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      # ── Checkout source assets from isotope-code (public repo) ───────────
      - name: ⬇️ Checkout isotope-code (source assets)
        uses: actions/checkout@v7
        with:
          repository: Suydev/isotope-code
          ref: ${{ env.ISOTOPE_CODE_REF }}
          path: isotope-code

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: ☕ Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: ''
          log-accepted-android-sdk-licenses: false

      - name: 📦 Install Android SDK Build Tools & Platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: 📥 Install npm dependencies
        run: npm ci

      - name: ✅ Run regression tests
        run: npm test

      - name: ✅ Release syntax checks
        run: |
          set -euo pipefail
          node --check android-bridge.js
          node --check android-floating-timer-bridge.js
          node --check scripts/prepare-www.js
          node --check scripts/apply-android-patches.js

      # ── Build www/ and native Android project ─────────────────────────────
      - name: 🏗️ Prepare www/ (copy assets + inject bridge + boot splash)
        env:
          REPO_DIR: ${{ github.workspace }}/isotope-code
          SOURCE_DIR: ${{ github.workspace }}/isotope-code/public
          WWW_DIR: ${{ github.workspace }}/www
          BRIDGE_FILE: ${{ github.workspace }}/android-bridge.js
        run: node scripts/prepare-www.js

      - name: 🩹 Apply Android bundle and native patches
        env:
          WWW_DIR: ${{ github.workspace }}/www
          ANDROID_DIR: ${{ github.workspace }}/android
        run: node scripts/apply-android-patches.js

      - name: 🔄 Sync Capacitor
        run: npx cap sync android

      - name: 🩹 Re-apply native patches after Capacitor sync
        env:
          WWW_DIR: ${{ github.workspace }}/www
          ANDROID_DIR: ${{ github.workspace }}/android
        run: node scripts/apply-android-patches.js

      - name: 🔧 Make Gradle wrapper executable
        working-directory: android
        run: chmod +x gradlew

      - name: 🏗️ Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"

      - name: 🔎 Locate built APK
        id: apk
        run: |
          set -euo pipefail
          APK_PATH=$(find android -name "*.apk" -path "*release*" -type f | head -1)
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find android -name "*.apk" -type f | head -1)
          fi
          if [ -z "$APK_PATH" ]; then
            echo "❌ No APK found after build"
            exit 1
          fi
          VERSION="${{ steps.tag.outputs.version }}"
          RENAMED="IsotopeAI-v${VERSION}.apk"
          cp "$APK_PATH" "$RENAMED"
          echo "path=${RENAMED}" >> "$GITHUB_OUTPUT"
          echo "Found APK: $APK_PATH ($(du -h "$APK_PATH" | cut -f1)) → $RENAMED"

      # ── Release notes ──────────────────────────────────────────────────────
      - name: 📋 Extract changelog section (if CHANGELOG.md exists)
        id: changelog
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          if [ -f "CHANGELOG.md" ]; then
            NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          else
            NOTES=""
          fi
          if [ -z "$NOTES" ]; then
            NOTES="See the commit history for what's changed in this build."
          fi
          echo "$NOTES" > /tmp/changelog_notes.txt
          {
            echo "notes<<CHANGELOG_EOF"
            cat /tmp/changelog_notes.txt
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: 📝 Build release notes
        run: |
          cat > /tmp/release_notes.md <<EOF
          ## IsotopeAI Android ${{ steps.tag.outputs.tag }}

          ${{ steps.changelog.outputs.notes }}

          ---

          ### 📱 Install
          Download \`IsotopeAI-v${{ steps.tag.outputs.version }}.apk\` below and
          install it on your Android device (Android 8.0+). You may need to allow
          "install from unknown sources" for your browser/file manager.

          ### 🧩 Built from
          - isotope-apk @ \`${{ github.sha }}\`
          - isotope-code @ \`${{ env.ISOTOPE_CODE_REF }}\`

          ### ❤️ Support
          UPI: \`9699393886@fam\` · [isotopeai.in](https://isotopeai.in)
          EOF

      - name: 🏷️ Ensure release tag points to this commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$TAG" "$GITHUB_SHA"
          git push --force origin "refs/tags/$TAG"

      - name: 🎉 Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.tag }}"
          APK="${{ steps.apk.outputs.path }}"
          PRERELEASE_FLAG=()
          if printf '%s' "$TAG" | grep -Eq -- '(-beta|-rc)'; then
            PRERELEASE_FLAG=(--prerelease)
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --title "IsotopeAI Android ${TAG}" \
              --notes-file /tmp/release_notes.md \
              "${PRERELEASE_FLAG[@]}"
          else
            gh release create "$TAG" \
              --target "$GITHUB_SHA" \
              --title "IsotopeAI Android ${TAG}" \
              --notes-file /tmp/release_notes.md \
              "${PRERELEASE_FLAG[@]}"
          fi
          gh release upload "$TAG" "$APK" --clobber
          echo "✅ Release ${TAG} published with ${APK}"
