name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (debug or release)'
        required: false
        default: 'debug'
        type: choice
        options: [debug, release]

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '22'

jobs:
  build-debug-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ── Checkout this repo (Capacitor wrapper + bridge) ───────────────────
      - name: Checkout isotope-apk
        uses: actions/checkout@v4
        with:
          path: isotope-apk

      # ── Checkout source assets from isotope-code ──────────────────────────
      # isotope-code is a public repo — no token needed
      - name: Checkout isotope-code (source assets)
        uses: actions/checkout@v4
        with:
          repository: Suydev/isotope-code
          path: isotope-code

      # ── Node.js setup ─────────────────────────────────────────────────────
      # No npm cache — package-lock.json is not committed to this repo
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # ── Java setup ────────────────────────────────────────────────────────
      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      # ── Android SDK ───────────────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: Install Android SDK Build Tools & Platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      # ── Install npm dependencies ──────────────────────────────────────────
      - name: Install npm dependencies
        working-directory: isotope-apk
        run: npm install

      # ── Verify source structure before copying ────────────────────────────
      - name: Verify isotope-code source structure
        run: |
          echo "=== isotope-code root ==="
          ls -la ${{ github.workspace }}/isotope-code/
          echo ""
          echo "=== isotope-code/public/ ==="
          ls -la ${{ github.workspace }}/isotope-code/public/
          echo ""
          echo "=== isotope-code/public/assets/ (JS count) ==="
          ls ${{ github.workspace }}/isotope-code/public/assets/*.js | wc -l
          echo ""
          echo "Key bundles:"
          ls -lh ${{ github.workspace }}/isotope-code/public/assets/App-*.js 2>/dev/null || echo "No App-*.js found"
          ls -lh ${{ github.workspace }}/isotope-code/public/assets/index-BPYJFSVW.js 2>/dev/null || echo "index-BPYJFSVW.js not found (may have new hash)"

      # ── Prepare www/ directory ────────────────────────────────────────────
      # REPO_DIR = isotope-code root (index.html lives HERE, not in public/)
      # SOURCE_DIR = isotope-code/public/ (all static assets)
      # prepare-www.js copies:
      #   1. public/* → www/
      #   2. root index.html → www/index.html  (overwrites if public/ had one)
      #   3. android-bridge.js → www/ (first script injected into <head>)
      #   4. Disables sw.js, pwa-local.js, update-checker.js
      - name: Prepare www/ (copy assets + inject bridge)
        working-directory: isotope-apk
        env:
          REPO_DIR: ${{ github.workspace }}/isotope-code
          SOURCE_DIR: ${{ github.workspace }}/isotope-code/public
          WWW_DIR: ${{ github.workspace }}/isotope-apk/www
          BRIDGE_FILE: ${{ github.workspace }}/isotope-apk/android-bridge.js
        run: node scripts/prepare-www.js

      # ── Report www/ size ──────────────────────────────────────────────────
      - name: Report www/ size
        working-directory: isotope-apk
        run: |
          echo "=== www/ top-level ==="
          ls -lh www/
          echo ""
          echo "=== Total size ==="
          du -sh www/
          echo ""
          echo "=== index.html bridge injection check ==="
          head -10 www/index.html
          echo ""
          echo "=== Largest files ==="
          find www/ -type f -printf '%s %p\n' | sort -rn | head -20 | awk '{printf "%.1f MB  %s\n", $1/1024/1024, $2}'

      # ── Initialize Capacitor Android project ──────────────────────────────
      - name: Add Capacitor Android platform
        working-directory: isotope-apk
        run: |
          npx cap add android 2>&1 || echo "Android platform already exists or was added"
          echo "Capacitor platform step complete"

      # ── Apply Android patches ─────────────────────────────────────────────
      # Patches JS bundles in www/assets/ and AndroidManifest.xml after cap add
      - name: Apply Android manifest and gradle patches
        working-directory: isotope-apk
        env:
          WWW_DIR: ${{ github.workspace }}/isotope-apk/www
          ANDROID_DIR: ${{ github.workspace }}/isotope-apk/android
        run: node scripts/apply-android-patches.js

      # ── Sync Capacitor ────────────────────────────────────────────────────
      - name: Sync Capacitor
        working-directory: isotope-apk
        run: npx cap sync android

      # ── Make Gradle executable ────────────────────────────────────────────
      - name: Make Gradle wrapper executable
        working-directory: isotope-apk/android
        run: chmod +x gradlew

      # ── Build Debug APK ───────────────────────────────────────────────────
      - name: Build Debug APK
        working-directory: isotope-apk/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"

      # ── Find and report APK ───────────────────────────────────────────────
      - name: Find APK and report size
        working-directory: isotope-apk
        run: |
          echo "=== Built APK(s) ==="
          find android -name "*.apk" -type f | while read f; do
            size=$(du -sh "$f" | cut -f1)
            echo "  $size  $f"
          done

      # ── Upload APK artifact ───────────────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: IsotopeAI-debug-${{ github.run_number }}
          path: isotope-apk/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error

      # ── Upload build logs on failure ──────────────────────────────────────
      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_number }}
          path: |
            isotope-apk/android/app/build/reports/
            isotope-apk/android/build/reports/
          retention-days: 7
          if-no-files-found: ignore

  # Optional: release build (only on workflow_dispatch with release input)
  build-release-aab:
    name: Build Release AAB
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'release'
    needs: build-debug-apk

    steps:
      - name: Checkout isotope-apk
        uses: actions/checkout@v4
        with:
          path: isotope-apk

      - name: Checkout isotope-code (source assets)
        uses: actions/checkout@v4
        with:
          repository: Suydev/isotope-code
          path: isotope-code

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: Install Android SDK components
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Install dependencies
        working-directory: isotope-apk
        run: npm install

      - name: Prepare www/
        working-directory: isotope-apk
        env:
          REPO_DIR: ${{ github.workspace }}/isotope-code
          SOURCE_DIR: ${{ github.workspace }}/isotope-code/public
          WWW_DIR: ${{ github.workspace }}/isotope-apk/www
          BRIDGE_FILE: ${{ github.workspace }}/isotope-apk/android-bridge.js
        run: node scripts/prepare-www.js

      - name: Add & sync Capacitor Android
        working-directory: isotope-apk
        env:
          WWW_DIR: ${{ github.workspace }}/isotope-apk/www
          ANDROID_DIR: ${{ github.workspace }}/isotope-apk/android
        run: |
          npx cap add android 2>&1 || true
          node scripts/apply-android-patches.js
          npx cap sync android

      - name: Make Gradle executable
        working-directory: isotope-apk/android
        run: chmod +x gradlew

      - name: Build Release AAB
        working-directory: isotope-apk/android
        run: ./gradlew bundleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: IsotopeAI-release-aab-${{ github.run_number }}
          path: isotope-apk/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
          if-no-files-found: error
