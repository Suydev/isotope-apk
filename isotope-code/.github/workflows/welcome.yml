name: 👋 Welcome New Contributors

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    name: Post welcome message
    runs-on: ubuntu-latest

    steps:
      - name: 👋 Welcome first-time issue opener
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const sender = context.payload.sender.login;

            // Check if this is their first issue
            const issues = await github.rest.issues.listForRepo({
              owner, repo,
              creator: sender,
              state: 'all',
              per_page: 2
            });

            if (issues.data.length <= 1) {
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: context.issue.number,
                body: `👋 Hey @${sender}, thanks for opening your first issue on IsotopeAI!

            We'll get back to you as soon as possible. In the meantime:

            - 📖 Check [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md) for guidelines
            - 🔧 Run \`isotope doctor\` to diagnose most common issues
            - 📋 Make sure you've included Node.js version, OS, and server logs

            🌟 If IsotopeAI helped your studies, consider giving the repo a star — it helps other students find it!

            Thanks for making IsotopeAI better 🙏`
              });
            }

      - name: 🎉 Welcome first-time PR opener
        if: github.event_name == 'pull_request_target'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const sender = context.payload.sender.login;

            // Check if this is their first PR
            const prs = await github.rest.pulls.list({
              owner, repo,
              state: 'all',
              per_page: 100
            });
            const userPRs = prs.data.filter(p => p.user.login === sender);

            if (userPRs.length <= 1) {
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: context.payload.pull_request.number,
                body: `🎉 Woohoo! @${sender} just opened their **first PR** on IsotopeAI — that's awesome!

            Thank you for contributing! Here's the checklist before we review:

            - [ ] No \`.env\` or secrets committed
            - [ ] RLS policies not weakened
            - [ ] \`isotope-complete.sql\` updated if DB schema changed
            - [ ] \`CHANGELOG.md\` updated
            - [ ] Sync proof: browser action → Supabase row → cache clear → login → data restored

            We'll review this as soon as possible 🚀`
              });
            }
