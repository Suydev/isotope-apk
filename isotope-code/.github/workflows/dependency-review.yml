name: 🔒 Dependency Review

on:
  pull_request:
    branches: [main]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'npm-shrinkwrap.json'
      - 'yarn.lock'

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Review dependency changes
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🔒 Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always

      - name: 📊 Report package.json stats
        run: |
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('./package.json', 'utf8'));
            const deps = Object.keys(p.dependencies || {}).length;
            const dev  = Object.keys(p.devDependencies || {}).length;
            console.log('Production deps:', deps);
            console.log('Dev deps:', dev);
            console.log('Node engines:', p.engines && p.engines.node ? p.engines.node : 'not specified');
          "
